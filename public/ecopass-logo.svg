<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="EcoPass logo">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D4A"/>
      <stop offset="50%" stop-color="#1E8E5A"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Sfondo circolare -->
  <circle cx="60" cy="60" r="56" fill="url(#circleGrad)" filter="url(#shadow)"/>
  
  <!-- Cerchio interno per profondità -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#4CAF50" stroke-width="2" opacity="0.4"/>
  
  <!-- Foglia stilizzata -->
  <path d="M60 25 
           C75 25, 88 38, 88 55
           C88 72, 75 82, 60 95
           C45 82, 32 72, 32 55
           C32 38, 45 25, 60 25Z" 
        fill="url(#leafGrad)"/>
  
  <!-- Nervo centrale della foglia -->
  <path d="M60 30 L60 88" stroke="#1B5E20" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Venature laterali -->
  <path d="M60 45 L48 52" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M60 55 L72 62" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M60 65 L48 72" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M60 75 L72 78" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Cerchio di riciclaggio stilizzato attorno -->
  <path d="M60 8 A52 52 0 0 1 112 60" fill="none" stroke="#81C784" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M112 60 A52 52 0 0 1 60 112" fill="none" stroke="#81C784" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M60 112 A52 52 0 0 1 8 60" fill="none" stroke="#81C784" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Punti accent -->
  <circle cx="60" cy="8" r="3" fill="#B8F5D6"/>
  <circle cx="112" cy="60" r="3" fill="#B8F5D6"/>
  <circle cx="60" cy="112" r="3" fill="#B8F5D6"/>
</svg>

