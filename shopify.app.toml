client_id = "4a4fb62aa9f05caa2a2d8225eb70c98a"
name = "EcoPass"
application_url = "https://ecopass-app.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-04"

[webhooks.privacy_compliance]
customer_data_request_url = "/webhooks/customers/data_request"
customer_deletion_url = "/webhooks/customers/redact"
shop_deletion_url = "/webhooks/shop/redact"

[access_scopes]
scopes = "read_products,write_products"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://ecopass-app.fly.dev/auth/callback",
  "https://ecopass-app.fly.dev/auth/shopify/callback",
  "https://ecopass-app.fly.dev/api/auth/callback"
]
